<svg width="220" height="140" viewBox="0 0 220 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Metallic Gradient -->
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="30%" stop-color="#c0c0c0"/>
      <stop offset="60%" stop-color="#888"/>
      <stop offset="100%" stop-color="#2b2b2b"/>
    </linearGradient>

    <!-- Accent Glow -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5a1f"/>
      <stop offset="100%" stop-color="#ff1e00"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Left Plates -->
  <rect x="20" y="40" width="12" height="60" rx="3" fill="url(#metal)" filter="url(#shadow)"/>
  <rect x="34" y="45" width="8" height="50" rx="2" fill="url(#accent)"/>

  <!-- Bar -->
  <rect x="42" y="65" width="120" height="10" rx="5" fill="url(#metal)" filter="url(#shadow)"/>

  <!-- Right Plates -->
  <rect x="162" y="45" width="8" height="50" rx="2" fill="url(#accent)"/>
  <rect x="172" y="40" width="12" height="60" rx="3" fill="url(#metal)" filter="url(#shadow)"/>
</svg>